version: '3.8'

services:
  ros2-mocap-optitrack:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - workspace=${workspace}
        - rosversion=${rosversion}
    image: mocap-optitrack:ros2

    container_name: ${container_name}
    hostname: ${hostname}
    extra_hosts:
      - "${hostname}:127.0.0.1"
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID}
      - ROS_LOCALHOST_ONLY=${ROS_LOCALHOST_ONLY}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION}
      - FASTDDS_DEFAULT_PROFILES_FILE=${FASTDDS_DEFAULT_PROFILES_FILE}
      - CYCLONEDDS_URI=${CYCLONEDDS_URI}
      - RMW_ZENOH_CONFIG_FILE=${RMW_ZENOH_CONFIG_FILE}
    devices:
      - /dev/dri:/dev/dri
    volumes:
    # In newest versions of linux distributions, the display server uses Wayland instead of X11
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./files/src:/home/${workspace}/src
      - ./dds_profiles:/dds_profiles:ro
    stdin_open: true
    tty: true
    command: bash
